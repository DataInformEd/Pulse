<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pulse Point - Local Test</title>
    <style>
        body { font-family: sans-serif; padding: 20px; max-width: 400px; margin: auto; }
        input { display: block; width: 100%; margin-bottom: 15px; padding: 10px; }
        button { padding: 10px 20px; background: #007bff; color: white; border: none; cursor: pointer; }
    </style>
</head>
<body>

    <h2>Pulse Point Test App</h2>
    
    <input type="email" id="email" placeholder="Student/Staff Email" required>
    <input type="text" id="q1" placeholder="Answer to Question 1">
    <input type="text" id="q2" placeholder="Answer to Question 2">
    
    <button id="submitBtn" onclick="sendData()">Submit Survey</button>
    <p id="statusMessage"></p>

    <script>
        // THIS IS THE BRIDGE: Replace the URL below with the Web App URL you just copied.
        const GAS_WEB_APP_URL = "https://script.google.com/macros/s/AKfycbxgwOiHSx_K0eOsyqQ8jadABsdkf4OOKrEF-wVFq9x47SdFSl9CYnFN3jI57aubXr_K/exec";

        async function sendData() {
            document.getElementById("statusMessage").innerText = "Sending data...";
            document.getElementById("submitBtn").disabled = true;

            // 1. Gather the data from the inputs
            const payload = {
                email: document.getElementById("email").value,
                question1: document.getElementById("q1").value,
                question2: document.getElementById("q2").value
            };

            try {
                // 2. Send the package to your open Google API
                const response = await fetch(GAS_WEB_APP_URL, {
                    method: "POST",
                    body: JSON.stringify(payload)
                });

                // 3. Read the receipt
                const result = await response.json();
                
                if (result.status === "success") {
                    document.getElementById("statusMessage").innerText = "Success! Data sent to Google Sheets.";
                } else {
                    document.getElementById("statusMessage").innerText = "Error: " + result.message;
                }
            } catch (error) {
                document.getElementById("statusMessage").innerText = "Network Error: " + error.message;
            }
            
            document.getElementById("submitBtn").disabled = false;
        }
    </script>
</body>
</html>
